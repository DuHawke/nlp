<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multilingual-NLP</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080e12;
            --bg1: #0c1419;
            --bg2: #101c23;
            --bg3: #14232c;
            --jade: #2dd4a0;
            --jade-dim: rgba(45, 212, 160, 0.12);
            --jade-glow: rgba(45, 212, 160, 0.25);
            --gold: #f0c060;
            --sky: #60b8f0;
            --border: rgba(45, 212, 160, 0.15);
            --border2: rgba(255, 255, 255, 0.06);
            --text: #d8eae4;
            --text2: #7a9e94;
            --text3: #3a5a52;
            --red: #f06060;
            --serif: 'Playfair Display', Georgia, serif;
            --mono: 'DM Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-mesh {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 20%, rgba(45, 212, 160, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 90% 80%, rgba(96, 184, 240, 0.05) 0%, transparent 60%);
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(45, 212, 160, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 212, 160, 0.04) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            top: -150px;
            left: -100px;
            background: rgba(45, 212, 160, 0.04);
        }

        .orb2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -80px;
            background: rgba(96, 184, 240, 0.04);
            animation-delay: -5s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(20px, -30px) scale(1.04);
            }
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 56px 28px 80px;
        }

        header {
            margin-bottom: 44px;
            animation: fadeUp 0.7s ease both;
        }

        h1 {
            font-family: var(--serif);
            font-size: clamp(48px, 7vw, 88px);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.03em;
            color: #e8f4f0;
            white-space: nowrap;
        }

        h1 .hl {
            font-style: italic;
            color: var(--jade);
        }

        .lang-section {
            margin-bottom: 16px;
            animation: fadeUp 0.7s ease 0.08s both;
        }

        .lang-card {
            display: flex;
            align-items: center;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: visible;
            box-shadow: 0 4px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(45, 212, 160, 0.08);
        }

        .detect-side {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            min-width: 0;
        }

        .detect-spin {
            font-size: 16px;
            color: var(--jade);
            opacity: 0.7;
            flex-shrink: 0;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .detect-info {
            flex: 1;
            min-width: 0;
        }

        .detect-label {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--jade);
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .detect-name {
            font-size: 13px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .detect-flag {
            font-size: 22px;
            flex-shrink: 0;
        }

        .sep {
            width: 1px;
            height: 36px;
            background: var(--border);
            flex-shrink: 0;
        }

        .arrow-icon {
            padding: 0 10px;
            font-size: 14px;
            color: var(--text3);
            flex-shrink: 0;
        }

        .tgt-side {
            flex: 1;
            position: relative;
        }

        .tgt-btn {
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--mono);
            color: var(--text);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            border-radius: 0 10px 10px 0;
        }

        .tgt-btn:hover {
            background: rgba(45, 212, 160, 0.05);
        }

        .tgt-flag {
            font-size: 22px;
            flex-shrink: 0;
        }

        .tgt-info {
            flex: 1;
            text-align: left;
        }

        .tgt-code {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 2px;
        }

        .tgt-name {
            font-size: 13px;
        }

        .tgt-arrow {
            font-size: 9px;
            color: var(--text3);
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .tgt-side.open .tgt-arrow {
            transform: rotate(180deg);
        }

        .pivot-badge {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 6px;
            margin-bottom: 14px;
            background: rgba(240, 192, 96, 0.08);
            border: 1px solid rgba(240, 192, 96, 0.2);
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        #langPopup {
            position: fixed;
            z-index: 99999;
            width: 270px;
            background: #0b1a22;
            border: 1px solid rgba(45, 212, 160, 0.4);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(45, 212, 160, 0.08), 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 60px rgba(45, 212, 160, 0.1);
            max-height: min(400px, calc(100vh - 100px));
            backdrop-filter: blur(20px);
            flex-direction: column;
            display: none;
        }

        #langPopup.open {
            display: flex;
            animation: popIn 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-6px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .popup-hd {
            padding: 10px 16px 8px;
            flex-shrink: 0;
            font-size: 9px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--jade);
            border-bottom: 1px solid rgba(45, 212, 160, 0.12);
            background: rgba(45, 212, 160, 0.05);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .popup-hd::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--jade);
            box-shadow: 0 0 8px var(--jade);
        }

        .popup-list {
            overflow-y: auto;
            flex: 1;
            overscroll-behavior: contain;
        }

        .lang-opt {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text2);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.12s, color 0.12s, padding-left 0.12s;
        }

        .lang-opt:last-child {
            border-bottom: none;
        }

        .lang-opt:hover {
            background: rgba(45, 212, 160, 0.09);
            color: var(--text);
            padding-left: 22px;
        }

        .lang-opt.sel {
            color: var(--jade);
            background: rgba(45, 212, 160, 0.08);
        }

        .lang-opt.sel::after {
            content: '✓';
            margin-left: auto;
            font-size: 11px;
        }

        .lang-opt .fl {
            font-size: 20px;
            flex-shrink: 0;
        }

        .editor-wrap {
            margin-bottom: 14px;
            animation: fadeUp 0.7s ease 0.16s both;
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .panel {
            background: var(--bg1);
            border: 1px solid var(--border2);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.25s;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
        }

        .panel:focus-within {
            border-color: rgba(45, 212, 160, 0.28);
            box-shadow: 0 0 0 3px rgba(45, 212, 160, 0.05), 0 2px 16px rgba(0, 0, 0, 0.2);
        }

        .panel-out {
            background: var(--bg2);
            border-color: rgba(45, 212, 160, 0.1);
        }

        .p-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 16px;
            border-bottom: 1px solid var(--border2);
            background: rgba(0, 0, 0, 0.12);
            flex-shrink: 0;
        }

        .p-tag {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .p-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text3);
        }

        .panel-out .p-dot {
            background: var(--jade);
            box-shadow: 0 0 6px var(--jade);
        }

        .char-ct {
            font-size: 10px;
            color: var(--text3);
        }

        .char-ct.warn {
            color: var(--red);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            resize: none;
            font-family: var(--serif);
            font-size: 17px;
            line-height: 1.8;
            color: var(--text);
            padding: 18px 18px 14px;
            min-height: 220px;
            caret-color: var(--jade);
        }

        textarea::placeholder {
            color: var(--text3);
            font-style: italic;
        }

        .out-body {
            flex: 1;
            padding: 18px 18px 14px;
            font-family: var(--serif);
            font-size: 17px;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
            min-height: 220px;
            overflow-y: auto;
        }

        .out-ph {
            color: var(--text3);
            font-style: italic;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        .typing::after {
            content: '|';
            color: var(--jade);
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }

        .prog-wrap {
            height: 3px;
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            display: none;
        }

        .prog-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--jade), var(--sky));
        }

        .prog-bar.run {
            width: 45% !important;
            animation: pslide 1.3s ease-in-out infinite;
        }

        @keyframes pslide {
            0% {
                transform: translateX(-200%)
            }

            100% {
                transform: translateX(320%)
            }
        }

        .actions {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.7s ease 0.24s both;
        }

        .btn-go {
            flex: 1;
            padding: 15px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            transition: all 0.22s;
            background: linear-gradient(135deg, var(--jade), #1ab88a);
            color: #061410;
            box-shadow: 0 4px 20px rgba(45, 212, 160, 0.3);
        }

        .btn-go:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(45, 212, 160, 0.4);
        }

        .btn-go:disabled {
            background: var(--bg3);
            color: var(--text3);
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-cp {
            padding: 15px 18px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            cursor: pointer;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.22s;
            white-space: nowrap;
        }

        .btn-cp:hover:not(:disabled) {
            border-color: var(--jade);
            color: var(--jade);
        }

        .btn-cp.done {
            border-color: var(--jade);
            color: var(--jade);
        }

        .btn-cp:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .err-box {
            display: none;
            margin-bottom: 12px;
            padding: 11px 16px;
            background: rgba(240, 96, 96, 0.07);
            border: 1px solid rgba(240, 96, 96, 0.2);
            border-radius: 6px;
            font-size: 11px;
            color: #f08080;
            line-height: 1.6;
        }

        .err-box.show {
            display: block;
        }

        footer {
            margin-top: 36px;
            padding-top: 22px;
            border-top: 1px solid var(--border2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeUp 0.7s ease 0.32s both;
        }

        .ft-status {
            font-size: 11px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ft-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--jade);
            box-shadow: 0 0 8px var(--jade);
            animation: pulse 2s infinite;
        }

        .ft-device {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--text2);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(45, 212, 160, 0.2);
            border-radius: 2px;
        }

        @media (max-width: 680px) {
            .panels {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 44px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-layer">
        <div class="bg-mesh"></div>
        <div class="bg-grid"></div>
        <div class="bg-orb orb1"></div>
        <div class="bg-orb orb2"></div>
    </div>

    <div class="wrap">

        <header>
            <h1>Multilingual-<span class="hl">NLP</span></h1>
        </header>

        <div class="lang-section">
            <div class="lang-card">

                <div class="detect-side">
                    <div class="detect-spin">⟳</div>
                    <div class="detect-info">
                        <div class="detect-label">Tự động nhận diện</div>
                        <div class="detect-name" id="detectedName">Đang chờ văn bản…</div>
                    </div>
                    <div class="detect-flag" id="detectedFlag"></div>
                </div>

                <div class="sep"></div>
                <div class="arrow-icon">→</div>
                <div class="sep"></div>

                <div class="tgt-side" id="tgtSide">
                    <button class="tgt-btn" onclick="togglePopup()">
                        <span class="tgt-flag" id="tgtFlag">🇬🇧</span>
                        <div class="tgt-info">
                            <div class="tgt-code" id="tgtCode">EN</div>
                            <div class="tgt-name" id="tgtName">English</div>
                        </div>
                        <span class="tgt-arrow">▾</span>
                    </button>
                </div>

            </div>
        </div>

        <div id="langPopup">
            <div class="popup-hd">Ngôn ngữ đích</div>
            <div class="popup-list" id="popupList"></div>
        </div>

        <div class="pivot-badge" id="pivotBadge"></div>

        <div class="editor-wrap">
            <div class="panels">
                <div class="panel">
                    <div class="p-head">
                        <span class="p-tag">
                            <div class="p-dot"></div>Văn bản gốc
                        </span>
                        <span class="char-ct" id="charCt">0 / 2000</span>
                    </div>
                    <textarea id="inputText" placeholder="Nhập văn bản cần dịch…&#10;Ctrl + Enter để dịch"
                        maxlength="2000" oninput="onInput()" onkeydown="onKey(event)"></textarea>
                </div>

                <div class="panel panel-out">
                    <div class="p-head">
                        <span class="p-tag">
                            <div class="p-dot"></div>Bản dịch
                        </span>
                    </div>
                    <div class="out-body" id="outBody">
                        <span class="out-ph">Bản dịch sẽ xuất hiện ở đây…</span>
                    </div>
                    <div class="prog-wrap" id="progWrap">
                        <div class="prog-bar" id="progBar"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="err-box" id="errBox"></div>

        <div class="actions">
            <button class="btn-go" id="btnGo" onclick="doTranslate()" disabled>
                ✦ &nbsp; Dịch &nbsp;·&nbsp; Ctrl+Enter
            </button>
            <button class="btn-cp" id="btnCp" onclick="doCopy()" disabled>Sao chép</button>
        </div>

        <footer>
            <div class="ft-status">
                <div class="ft-dot" id="ftDot"></div>
                <span id="ftMsg">Đang kết nối…</span>
            </div>
            <div class="ft-device">
                <span id="devIcon">⚙</span>
                <span id="devLabel">…</span>
            </div>
        </footer>

    </div>

    <script>
        const API = 'http://localhost:8000/api';

        const LANGS = [
            { code: 'vi', name: 'Tiếng Việt', flag: '🇻🇳' },
            { code: 'en', name: 'English', flag: '🇬🇧' },
            { code: 'fr', name: 'Français', flag: '🇫🇷' },
            { code: 'de', name: 'Deutsch', flag: '🇩🇪' },
            { code: 'es', name: 'Español', flag: '🇪🇸' },
            { code: 'zh', name: '中文', flag: '🇨🇳' },
            { code: 'ja', name: '日本語', flag: '🇯🇵' },
            { code: 'ko', name: '한국어', flag: '🇰🇷' },
            { code: 'ru', name: 'Русский', flag: '🇷🇺' },
            { code: 'ar', name: 'العربية', flag: '🇸🇦' },
            { code: 'it', name: 'Italiano', flag: '🇮🇹' },
            { code: 'pt', name: 'Português', flag: '🇧🇷' },
        ];

        let tgt = 'en';
        let busy = false;
        let outputText = '';

        async function init() {
            updateTgtUI();
            try {
                const res = await fetch(`${API}/health`);
                const h = await res.json();
                const dev = h.device.toUpperCase();
                document.getElementById('devLabel').textContent = dev;
                document.getElementById('devIcon').textContent = dev === 'CUDA' ? '⚡' : '🖥';
                setStatus('Sẵn sàng', true);
            } catch {
                setStatus('⚠ Server chưa chạy · uvicorn app:app --port 8000', false);
                document.getElementById('devLabel').textContent = 'offline';
                document.getElementById('devIcon').textContent = '✕';
            }
        }

        function buildPopupList() {
            document.getElementById('popupList').innerHTML = LANGS.map(l => `
    <button class="lang-opt ${l.code === tgt ? 'sel' : ''}" onclick="setTgt('${l.code}')">
      <span class="fl">${l.flag}</span><span>${l.name}</span>
    </button>`).join('');
        }

        function togglePopup() {
            const popup = document.getElementById('langPopup');
            if (popup.classList.contains('open')) { closePopup(); return; }

            const rect = document.getElementById('tgtSide').getBoundingClientRect();
            let left = rect.left;
            if (left + 270 > window.innerWidth - 12) left = window.innerWidth - 282;
            popup.style.top = (rect.bottom + 8) + 'px';
            popup.style.left = left + 'px';

            buildPopupList();
            popup.classList.remove('open');
            requestAnimationFrame(() => popup.classList.add('open'));
            document.getElementById('tgtSide').classList.add('open');
        }

        function closePopup() {
            document.getElementById('langPopup').classList.remove('open');
            document.getElementById('tgtSide').classList.remove('open');
        }

        function setTgt(code) {
            tgt = code;
            closePopup();
            updateTgtUI();
        }

        function updateTgtUI() {
            const l = LANGS.find(l => l.code === tgt);
            document.getElementById('tgtFlag').textContent = l.flag;
            document.getElementById('tgtCode').textContent = l.code.toUpperCase();
            document.getElementById('tgtName').textContent = l.name;
        }

        function onInput() {
            const v = document.getElementById('inputText').value;
            const el = document.getElementById('charCt');
            el.textContent = `${v.length} / 2000`;
            el.className = 'char-ct' + (v.length > 1800 ? ' warn' : '');
            document.getElementById('btnGo').disabled = !v.trim() || busy;
        }

        function onKey(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doTranslate(); }
        }

        async function doTranslate() {
            const text = document.getElementById('inputText').value.trim();
            if (!text || busy) return;
            busy = true;
            hideErr();
            setLoading(true);
            setStatus('Đang dịch…', true);

            const outEl = document.getElementById('outBody');
            outEl.textContent = '';
            outEl.classList.add('typing');

            try {
                const res = await fetch(`${API}/translate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, src_lang: 'auto', tgt_lang: tgt }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Lỗi server');

                outEl.classList.remove('typing');
                outputText = data.translated;
                outEl.textContent = outputText;
                document.getElementById('btnCp').disabled = false;

                const srcLang = LANGS.find(l => l.code === data.detected_src);
                if (srcLang) {
                    document.getElementById('detectedName').textContent = srcLang.name;
                    document.getElementById('detectedFlag').textContent = srcLang.flag;
                }

                document.getElementById('pivotBadge').style.display = 'none';

                setStatus('Dịch xong', true);

            } catch (e) {
                outEl.classList.remove('typing');
                outEl.innerHTML = '<span class="out-ph">Bản dịch sẽ xuất hiện ở đây…</span>';
                outputText = '';
                document.getElementById('btnCp').disabled = true;
                showErr(e.message);
                setStatus('Thất bại', false);
            } finally {
                busy = false;
                setLoading(false);
                document.getElementById('btnGo').disabled = !document.getElementById('inputText').value.trim();
            }
        }

        async function doCopy() {
            if (!outputText) return;
            await navigator.clipboard.writeText(outputText);
            const btn = document.getElementById('btnCp');
            btn.textContent = '✓ Đã sao chép'; btn.classList.add('done');
            setTimeout(() => { btn.textContent = 'Sao chép'; btn.classList.remove('done'); }, 2000);
        }

        function setLoading(on) {
            const pw = document.getElementById('progWrap');
            const pb = document.getElementById('progBar');
            const btn = document.getElementById('btnGo');
            pw.style.display = on ? 'block' : 'none';
            pb.classList.toggle('run', on);
            btn.disabled = on;
            btn.textContent = on ? '⏳ Đang xử lý…' : '✦  Dịch  ·  Ctrl+Enter';
        }

        function setStatus(msg, ok) {
            document.getElementById('ftMsg').textContent = msg;
            const dot = document.getElementById('ftDot');
            dot.style.background = ok ? 'var(--jade)' : 'var(--red)';
            dot.style.boxShadow = ok ? '0 0 8px var(--jade)' : '0 0 8px var(--red)';
        }

        function showErr(msg) { const e = document.getElementById('errBox'); e.textContent = '⚠  ' + msg; e.classList.add('show'); }
        function hideErr() { document.getElementById('errBox').classList.remove('show'); }

        document.addEventListener('click', e => {
            if (!e.target.closest('#langPopup') && !e.target.closest('#tgtSide')) closePopup();
        });
        window.addEventListener('scroll', e => {
            if (e.target !== document.getElementById('popupList')) closePopup();
        }, true);
        window.addEventListener('resize', closePopup);

        init();
    </script>
</body>

</html>
